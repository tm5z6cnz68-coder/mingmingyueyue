<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f3;padding:20px;color:#1a1a1a;min-height:100vh;}

/* top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;}
.sync-dot.ok{background:#1D9E75;}
.sync-dot.syncing{background:#EF9F27;animation:pulse .8s infinite;}
.sync-dot.err{background:#E24B4A;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#999;}
.leg-dot{width:8px;height:8px;border-radius:50%;}

/* grid */
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;align-items:stretch;}
@media(max-width:680px){body{padding:12px;}.grid{display:block;}}
@media(min-width:681px) and (max-width:1020px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}

/* card base */
.card{background:#fff;border:.5px solid #e8e8e6;border-bottom:2.5px solid #c8c8c4;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;position:relative;transition:box-shadow .2s;}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);}
.card.drag-over{box-shadow:0 0 0 2px #378ADD;background:#f7fbff;}
.card.dragging{opacity:.35;}

/* card header */
.card-head{display:flex;flex-direction:column;gap:5px;}
.head-row1{display:flex;align-items:center;gap:7px;padding-right:80px;}
.phase-dot{width:8px;height:8px;min-width:8px;border-radius:50%;flex-shrink:0;}
.proj-name-view{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;line-height:1.4;}
.proj-name-edit{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;outline:none;border:none;background:transparent;line-height:1.4;cursor:text;border-bottom:1px dashed #ddd;}
.head-row2{padding-left:15px;display:flex;align-items:center;gap:7px;}
.phase-badge{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;display:inline-block;}
.phase-badge-edit{font-size:11px;padding:3px 10px;border-radius:20px;outline:none;border:none;cursor:text;white-space:nowrap;font-family:inherit;display:inline-block;border-bottom:1px dashed rgba(0,0,0,.15);}
.phase-hint{font-size:10px;color:#aaa;display:none;white-space:nowrap;}
.phase-badge-edit:focus+.phase-hint{display:inline;}

/* action buttons top-right */
.card-actions{position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .15s;}
.card:hover .card-actions{opacity:1;}
.card.is-editing .card-actions{opacity:1;}
.btn-edit{font-size:11px;padding:3px 10px;border-radius:6px;border:.5px solid #ddd;background:#fff;color:#555;cursor:pointer;white-space:nowrap;}
.btn-edit:hover{background:#f5f5f3;}
.btn-done{font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:#1D9E75;color:#fff;cursor:pointer;white-space:nowrap;}
.btn-done:hover{background:#178a64;}
.btn-del{width:20px;height:20px;border-radius:50%;border:.5px solid #ddd;background:#f5f5f3;color:#bbb;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.btn-del:hover{color:#E24B4A;border-color:#E24B4A;}

/* divider */
.divl{height:.5px;background:#ebebeb;flex-shrink:0;}

/* sections */
.secs{display:flex;flex-direction:column;gap:8px;}
.sl{font-size:10px;font-weight:500;color:#aaa;letter-spacing:.02em;margin-bottom:4px;}

/* VIEW mode items */
.item-view-row{display:flex;align-items:flex-start;gap:6px;padding:2px 0;}
.prio-pip{width:3px;min-width:3px;border-radius:2px;margin-top:5px;flex-shrink:0;}
.prio-pip.p0{background:#e0e0e0;height:10px;}
.prio-pip.p1{background:#EF9F27;height:14px;}
.prio-pip.p2{background:#E24B4A;height:14px;}
.item-view-text{font-size:12px;line-height:1.5;flex:1;color:#444;}
.item-view-text.p1{color:#7A3D00;font-weight:500;}
.item-view-text.p2{color:#8B1A1A;font-weight:500;}
.item-done-check{width:11px;height:11px;min-width:11px;border-radius:2px;background:#1D9E75;margin-top:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.item-done-check::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;display:block;transform:rotate(-45deg) translateY(-1px);}

/* EDIT mode items */
.ir{display:flex;align-items:flex-start;gap:5px;padding:2px 3px;border-radius:5px;cursor:grab;}
.ir:active{cursor:grabbing;}
.ir.item-drag-over{background:#EBF4FF;outline:1.5px dashed #378ADD;outline-offset:1px;}
.ir.item-dragging{opacity:.3;}
.pdot{width:9px;height:9px;min-width:9px;border-radius:50%;margin-top:4px;flex-shrink:0;cursor:pointer;transition:transform .12s;border:1.5px solid transparent;}
.pdot:hover{transform:scale(1.5);}
.pdot.p0{background:#e0e0e0;border-color:#ccc;}
.pdot.p1{background:#EF9F27;border-color:#BA7517;}
.pdot.p2{background:#E24B4A;border-color:#A32D2D;}
.mc{width:12px;height:12px;min-width:12px;border-radius:3px;border:1.5px solid #ccc;cursor:pointer;margin-top:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.mc.tk{background:#1D9E75;border-color:#1D9E75;}
.mc.tk::after{content:'';width:6px;height:3.5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;display:block;transform:rotate(-45deg) translateY(-1px);}
.it{font-size:12px;line-height:1.5;flex:1;outline:none;border:none;background:transparent;word-break:break-all;white-space:pre-wrap;min-width:0;cursor:text;color:#555;}
.it.p1{color:#7A3D00;font-weight:500;}
.it.p2{color:#8B1A1A;font-weight:500;}
.dx{font-size:13px;color:#bbb;cursor:pointer;opacity:0;line-height:1.5;padding:0 2px;flex-shrink:0;}
.ir:hover .dx{opacity:1;}
.ar{display:flex;align-items:center;gap:3px;cursor:pointer;padding:2px 0 0;}
.ar span{font-size:11px;color:#bbb;}
.ar:hover span{color:#888;}

/* done fold */
.sp{flex:1;}
.df{border-top:.5px dashed #e0e0de;padding-top:7px;margin-top:1px;}
.dt{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;}
.dl{font-size:10px;color:#aaa;}
.dc{font-size:10px;background:#E1F5EE;color:#0F6E56;padding:1px 7px;border-radius:10px;}
.dch{font-size:9px;color:#aaa;margin-left:auto;}
.dlist{margin-top:5px;display:flex;flex-direction:column;gap:2px;}
.di{display:flex;align-items:flex-start;gap:5px;padding:1px 0;}
.dck{width:12px;height:12px;min-width:12px;border-radius:3px;background:#1D9E75;border:1.5px solid #1D9E75;cursor:pointer;margin-top:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.dck::after{content:'';width:6px;height:3.5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;display:block;transform:rotate(-45deg) translateY(-1px);}
.dtx{font-size:11px;color:#aaa;text-decoration:line-through;flex:1;line-height:1.5;}
.dsr{font-size:10px;color:#aaa;background:#f5f5f3;padding:1px 5px;border-radius:3px;white-space:nowrap;}

/* add card */
.ac{border:.5px dashed #ccc;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:100px;color:#bbb;font-size:13px;gap:6px;transition:all .15s;}
.ac:hover{background:#f0f0ee;color:#888;}

/* loading screen */
.loading-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;transition:opacity .4s ease;}
.loading-screen.hide{opacity:0;pointer-events:none;}
.spinner{width:36px;height:36px;border:3px solid #e0e0de;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:#888;}
.main-content{opacity:0;transition:opacity .4s ease;}
.main-content.show{opacity:1;}


/* mobile carousel */
@media(max-width:680px){
  .mobile-carousel{position:relative;overflow:hidden;width:100%;}
  .mobile-track{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform;}
  .mobile-track .card{flex:0 0 100%;width:100%;margin:0;}
  .mobile-nav{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;}
  .mob-dot{width:7px;height:7px;border-radius:50%;background:#ddd;cursor:pointer;transition:background .2s;}
  .mob-dot.active{background:#378ADD;}
  .mobile-arrows{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
  .mob-arrow{font-size:13px;color:#888;background:#fff;border:.5px solid #ddd;border-radius:8px;padding:6px 16px;cursor:pointer;}
  .mob-counter{font-size:12px;color:#aaa;}
  .mob-add{margin-top:14px;border:.5px dashed #ccc;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;height:54px;color:#bbb;font-size:13px;gap:6px;}
  .mob-add:active{background:#f0f0ee;}
  .card-actions{opacity:1 !important;}
}

/* login overlay */
.login-overlay{position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-overlay.hide{display:none;}
.login-box{background:#fff;border:.5px solid #e8e8e6;border-bottom:2.5px solid #c8c8c4;border-radius:14px;padding:28px 26px;width:300px;max-width:90vw;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 28px rgba(0,0,0,.06);}
.login-box h2{font-size:16px;color:#1a1a1a;margin-bottom:2px;}
.login-box p{font-size:12px;color:#999;margin-bottom:6px;}
.login-box input{border:.5px solid #ddd;border-radius:9px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;}
.login-box input:focus{border-color:#7F77DD;}
.login-box button{background:#3C3489;color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .2s;}
.login-box button:disabled{opacity:.5;cursor:default;}
.login-err{font-size:12px;color:#E24B4A;min-height:16px;}
.logout-btn{font-size:11px;color:#bbb;background:none;border:.5px solid #e0e0e0;border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{color:#888;border-color:#ccc;}
</style>

<body>

<div class="top-bar">
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">连接中…</span>
    <button class="logout-btn" id="logoutBtn" style="margin-left:10px;display:none;">退出</button>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#e0e0e0;border:1.5px solid #ccc;width:3px;height:10px;border-radius:2px;"></div>普通</div>
    <div class="leg-item"><div class="leg-dot" style="background:#EF9F27;width:3px;height:14px;border-radius:2px;"></div>紧急</div>
    <div class="leg-item"><div class="leg-dot" style="background:#E24B4A;width:3px;height:14px;border-radius:2px;"></div>必须马上做</div>
    <span style="font-size:11px;color:#bbb;">悬停卡片 → 点编辑</span>
  </div>
</div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>项目任务追踪</h2>
    <p>请登录后访问数据</p>
    <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="username">
    <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button id="loginBtn">登录</button>
  </div>
</div>
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">正在连接云端数据…</div>
</div>
<div class="main-content" id="mainContent">
  <div id="G"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);
const auth = getAuth(app);
const DATA_REF = ref(db, 'tasks');

const syncDot  = document.getElementById('syncDot');
const syncText = document.getElementById('syncText');
function setSyncStatus(s){
  syncDot.className='sync-dot '+s;
  syncText.textContent={ok:'已同步',syncing:'同步中…',err:'连接失败',connecting:'连接中…'}[s]||s;
}
setSyncStatus('connecting');

// ── constants ───────────────────────────────────────────────
const FL={progress:'手续进展',issues:'存在问题',solutions:'解决思路'};
const PM={
  '规划阶段':{bg:'#EEEDFE',c:'#3C3489',d:'#7F77DD'},
  '立项阶段':{bg:'#E6F1FB',c:'#185FA5',d:'#378ADD'},
  '征地阶段':{bg:'#FAEEDA',c:'#854F0B',d:'#EF9F27'},
  '开发阶段':{bg:'#FAECE7',c:'#712B13',d:'#D85A30'},
  '供地阶段':{bg:'#EAF3DE',c:'#3B6D11',d:'#639922'}
};
const DP={bg:'#F1EFE8',c:'#5F5E5A',d:'#888780'};
function gp(p){const k=Object.keys(PM).find(k=>p&&(p===k||p.includes(k.replace('阶段',''))));return PM[k]||DP;}

// ── state ────────────────────────────────────────────────────
let nid=10;
let cards=[
  {id:1,name:'控规调整',phase:'规划阶段',sd:false,editing:false,progress:[{t:'已提交规划局审查',done:false,p:0},{t:'待专家评审会',done:false,p:2}],issues:[{t:'用地性质变更程序复杂',done:false,p:0}],solutions:[{t:'联系规划局提前沟通，争取并联审批',done:false,p:0}]},
  {id:2,name:'土地收储',phase:'征地阶段',sd:false,editing:false,progress:[{t:'集体土地征收协议谈判中，完成60%',done:false,p:1}],issues:[{t:'部分村民补偿诉求偏高',done:false,p:0}],solutions:[{t:'引入第三方评估机构出具参考数据',done:false,p:0}]},
  {id:3,name:'环境评估',phase:'立项阶段',sd:false,editing:false,progress:[{t:'环评报告初稿完成',done:true,p:0},{t:'公示期已结束',done:false,p:0}],issues:[{t:'暂无重大问题',done:false,p:0}],solutions:[{t:'按计划推进批复流程',done:false,p:0}]},
  {id:4,name:'拆迁安置',phase:'征地阶段',sd:false,editing:false,progress:[{t:'安置方案已批复',done:true,p:0},{t:'签约率达75%',done:false,p:1}],issues:[{t:'剩余住户要求原地回迁',done:false,p:2}],solutions:[{t:'协调区政府研究补充方案',done:false,p:0}]},
  {id:5,name:'基础设施',phase:'开发阶段',sd:false,editing:false,progress:[{t:'道路管线设计图纸审查通过',done:true,p:0}],issues:[{t:'暂无',done:false,p:0}],solutions:[{t:'待土地移交后启动施工招标',done:false,p:0}]},
  {id:6,name:'资金计划',phase:'供地阶段',sd:false,editing:false,progress:[{t:'一期资金到位',done:true,p:0},{t:'二期申报中',done:false,p:1}],issues:[{t:'财政拨付进度略慢',done:false,p:0}],solutions:[{t:'向土储中心申请预拨款',done:false,p:0}]},
];

let mobileIdx=0;
let saveTimer=null;
let ignoreNext=false;
let dragCardId=null;
let dragItemInfo=null;

// ── firebase ─────────────────────────────────────────────────
function saveToFirebase(){
  if(saveTimer)clearTimeout(saveTimer);
  setSyncStatus('syncing');
  saveTimer=setTimeout(()=>{
    ignoreNext=true;
    // strip editing flag before saving
    const payload=cards.map(c=>({...c,editing:false}));
    set(DATA_REF,{cards:payload,nid})
      .then(()=>setSyncStatus('ok'))
      .catch(()=>setSyncStatus('err'));
  },600);
}

// ── show app after connect ───────────────────────────────────
function showApp(){
  const ls=document.getElementById('loadingScreen');
  const mc=document.getElementById('mainContent');
  if(ls&&!ls.classList.contains('hide')){
    ls.classList.add('hide');
    setTimeout(()=>{ls.style.display='none';},400);
  }
  if(mc)mc.classList.add('show');
}

let dataInited=false;
function initData(){
  if(dataInited)return;          // attach the listener only once, after login
  dataInited=true;
  onValue(DATA_REF,(snap)=>{
    if(ignoreNext){ignoreNext=false;return;}
    const val=snap.val();
    if(val&&val.cards){
      const editingIds=new Set(cards.filter(c=>c.editing).map(c=>c.id));
      function normItems(arr){return (arr||[]).map(x=>({t:x.t||'',done:x.done||false,p:x.p||0}));}
      cards=val.cards.map(c=>({
        id:c.id, name:c.name||'未命名', phase:c.phase||'规划阶段',
        sd:c.sd||false, editing:editingIds.has(c.id),
        progress:normItems(c.progress), issues:normItems(c.issues), solutions:normItems(c.solutions),
      }));
      nid=val.nid||nid;
      setSyncStatus('ok');
      showApp();
      render();
    } else {
      // database empty — DO NOT auto-overwrite. Just show what we have locally.
      // (Previously this branch wrote default data back, which could destroy real data.)
      setSyncStatus('ok');
      showApp();
      render();
    }
  },(err)=>{setSyncStatus('err');console.warn(err);showApp();render();});
}

// ── mutations ─────────────────────────────────────────────────
function setEditing(id,v){const c=cards.find(x=>x.id===id);if(c){c.editing=v;}render();}
function tog(id,f,i){const c=cards.find(x=>x.id===id);c[f][i].done=!c[f][i].done;saveToFirebase();render();}
function unc(id,f,t){const c=cards.find(x=>x.id===id);const it=c[f].find(x=>x.t===t&&x.done);if(it){it.done=false;saveToFirebase();render();}}
function tsd(id){cards.find(x=>x.id===id).sd^=1;render();}
function cyclePrio(id,f,i){const c=cards.find(x=>x.id===id);c[f][i].p=(c[f][i].p+1)%3;render();}
function ai(id,f){
  const c=cards.find(x=>x.id===id);c[f].push({t:'',done:false,p:0});render();
  setTimeout(()=>{const e=document.querySelectorAll('[data-id="'+id+'"][data-f="'+f+'"]');if(e.length)e[e.length-1].focus();},0);
}
function deli(id,f,i){cards.find(x=>x.id===id)[f].splice(i,1);render();}
function ui(id,f,i,v){cards.find(x=>x.id===id)[f][i].t=v;}
function addCard(){
  cards.push({id:nid++,name:'新项目',phase:'规划阶段',sd:false,editing:true,
    progress:[{t:'',done:false,p:0}],issues:[{t:'',done:false,p:0}],solutions:[{t:'',done:false,p:0}]});
  mobileIdx=cards.length-1;
  saveToFirebase();render();
  setTimeout(()=>{const n=document.querySelectorAll('.proj-name-edit');if(n.length)n[n.length-1].focus();},0);
}
function delCard(id){
  if(cards.length<=1)return;
  if(!confirm('确认删除这个项目？'))return;
  cards=cards.filter(x=>x.id!==id);
  if(mobileIdx>=cards.length)mobileIdx=cards.length-1;
  saveToFirebase();render();
}

// ── view section (read-only) ──────────────────────────────────
function buildSectionView(c,f){
  const active=c[f].filter(x=>!x.done);
  const w=document.createElement('div');
  const l=document.createElement('div');l.className='sl';l.textContent=FL[f];w.appendChild(l);
  if(active.length===0){
    const empty=document.createElement('div');empty.style.cssText='font-size:11px;color:#ccc;padding:2px 0;';empty.textContent='暂无内容';w.appendChild(empty);
  }
  active.forEach(item=>{
    const row=document.createElement('div');row.className='item-view-row';
    const pip=document.createElement('div');pip.className='prio-pip p'+item.p;row.appendChild(pip);
    const tx=document.createElement('div');tx.className='item-view-text p'+item.p;tx.textContent=item.t||'—';row.appendChild(tx);
    w.appendChild(row);
  });
  return w;
}

// ── edit section ──────────────────────────────────────────────
function buildSectionEdit(c,f){
  const act=c[f].filter(x=>!x.done);
  const w=document.createElement('div');
  const l=document.createElement('div');l.className='sl';l.textContent=FL[f];w.appendChild(l);
  act.forEach(item=>{
    const ri=c[f].indexOf(item);
    const row=document.createElement('div');row.className='ir';row.draggable=true;
    row.addEventListener('dragstart',e=>{dragItemInfo={cardId:c.id,field:f,idx:ri};dragCardId=null;row.classList.add('item-dragging');e.dataTransfer.effectAllowed='move';e.stopPropagation();});
    row.addEventListener('dragend',()=>{row.classList.remove('item-dragging');dragItemInfo=null;});
    row.addEventListener('dragover',e=>{if(!dragItemInfo||dragItemInfo.cardId!==c.id||dragItemInfo.field!==f)return;e.preventDefault();e.stopPropagation();row.classList.add('item-drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('item-drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();row.classList.remove('item-drag-over');
      if(!dragItemInfo||dragItemInfo.cardId!==c.id||dragItemInfo.field!==f)return;
      const from=dragItemInfo.idx,to=ri;if(from===to)return;
      const card=cards.find(x=>x.id===c.id);const[mv]=card[f].splice(from,1);card[f].splice(to,0,mv);
      dragItemInfo=null;render();
    });
    const pd=document.createElement('div');pd.className='pdot p'+item.p;
    pd.title=['普通→紧急','紧急→必须马上做','必须马上做→普通'][item.p];
    pd.onclick=e=>{e.stopPropagation();cyclePrio(c.id,f,ri);};row.appendChild(pd);
    const ck=document.createElement('div');ck.className='mc';ck.onclick=()=>tog(c.id,f,ri);row.appendChild(ck);
    const tx=document.createElement('div');tx.className='it p'+item.p;tx.contentEditable=true;tx.dataset.id=c.id;tx.dataset.f=f;tx.textContent=item.t;
    tx.addEventListener('mousedown',e=>e.stopPropagation());
    tx.addEventListener('input',e=>ui(c.id,f,ri,e.target.textContent));
    tx.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();ai(c.id,f);}
      if(e.key==='Backspace'&&tx.textContent===''&&c[f].length>1){e.preventDefault();deli(c.id,f,ri);}
    });
    row.appendChild(tx);
    const dx=document.createElement('span');dx.className='dx';dx.textContent='×';dx.onclick=()=>deli(c.id,f,ri);row.appendChild(dx);
    w.appendChild(row);
  });
  const ar=document.createElement('div');ar.className='ar';ar.innerHTML='<span>+ 添加</span>';ar.onclick=()=>ai(c.id,f);w.appendChild(ar);
  return w;
}

// ── card builder ──────────────────────────────────────────────
function buildCard(c,ci){
  const p=gp(c.phase);
  const da=c.progress.concat(c.issues,c.solutions).filter(x=>x.done);
  const isEdit=c.editing;

  const card=document.createElement('div');
  card.className='card'+(isEdit?' is-editing':'');
  card.dataset.id=c.id;

  // drag only in non-edit mode
  if(!isEdit){
    card.draggable=true;
    card.style.cursor='grab';
    card.addEventListener('dragstart',e=>{if(dragItemInfo)return;dragCardId=c.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragCardId=null;});
    card.addEventListener('dragover',e=>{if(dragItemInfo||!dragCardId||dragCardId===c.id)return;e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      if(dragItemInfo||!dragCardId||dragCardId===c.id)return;
      const fi=cards.findIndex(x=>x.id===dragCardId),ti=ci;
      const[mv]=cards.splice(fi,1);cards.splice(ti,0,mv);
      dragCardId=null;saveToFirebase();render();
    });
  }

  // action buttons
  const actions=document.createElement('div');actions.className='card-actions';
  if(isEdit){
    const btnDone=document.createElement('button');btnDone.className='btn-done';btnDone.textContent='完成';
    btnDone.onclick=()=>{setEditing(c.id,false);saveToFirebase();};
    actions.appendChild(btnDone);
  } else {
    const btnEdit=document.createElement('button');btnEdit.className='btn-edit';btnEdit.textContent='编辑';
    btnEdit.onclick=()=>setEditing(c.id,true);
    actions.appendChild(btnEdit);
  }
  const btnDel=document.createElement('button');btnDel.className='btn-del';btnDel.textContent='×';btnDel.title='删除项目';
  btnDel.onclick=()=>delCard(c.id);
  actions.appendChild(btnDel);
  card.appendChild(actions);

  // header
  const head=document.createElement('div');head.className='card-head';
  const r1=document.createElement('div');r1.className='head-row1';
  const phdot=document.createElement('div');phdot.className='phase-dot';phdot.style.background=p.d;

  if(isEdit){
    const nm=document.createElement('div');nm.className='proj-name-edit';nm.contentEditable=true;nm.textContent=c.name;
    nm.addEventListener('mousedown',e=>e.stopPropagation());
    nm.addEventListener('input',e=>{cards.find(x=>x.id===c.id).name=e.target.textContent;});
    nm.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();nm.blur();}});
    r1.appendChild(phdot);r1.appendChild(nm);
  } else {
    const nm=document.createElement('div');nm.className='proj-name-view';nm.textContent=c.name;
    r1.appendChild(phdot);r1.appendChild(nm);
  }

  const r2=document.createElement('div');r2.className='head-row2';
  if(isEdit){
    const badge=document.createElement('div');badge.className='phase-badge-edit';badge.contentEditable=true;badge.textContent=c.phase;badge.style.background=p.bg;badge.style.color=p.c;
    badge.addEventListener('mousedown',e=>e.stopPropagation());
    badge.addEventListener('input',e=>{
      const v=e.target.textContent.trim();cards.find(x=>x.id===c.id).phase=v;
      const np=gp(v);badge.style.background=np.bg;badge.style.color=np.c;phdot.style.background=np.d;
    });
    badge.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();badge.blur();}});
    const bh=document.createElement('span');bh.className='phase-hint';bh.textContent='规划·立项·征地·开发·供地';
    r2.appendChild(badge);r2.appendChild(bh);
  } else {
    const badge=document.createElement('div');badge.className='phase-badge';badge.textContent=c.phase;badge.style.background=p.bg;badge.style.color=p.c;
    r2.appendChild(badge);
  }

  head.appendChild(r1);head.appendChild(r2);card.appendChild(head);
  card.appendChild(Object.assign(document.createElement('div'),{className:'divl'}));

  // sections
  const sw=document.createElement('div');sw.className='secs';
  ['progress','issues','solutions'].forEach(f=>{
    sw.appendChild(isEdit ? buildSectionEdit(c,f) : buildSectionView(c,f));
  });
  card.appendChild(sw);
  card.appendChild(Object.assign(document.createElement('div'),{className:'sp'}));

  // done fold
  if(da.length>0){
    const df=document.createElement('div');df.className='df';
    const dt=document.createElement('div');dt.className='dt';dt.onclick=()=>tsd(c.id);
    const dl2=document.createElement('span');dl2.className='dl';dl2.textContent='已完成';
    const dcc=document.createElement('span');dcc.className='dc';dcc.textContent=da.length;
    const dch=document.createElement('span');dch.className='dch';dch.textContent=c.sd?'▴':'▾';
    dt.appendChild(dl2);dt.appendChild(dcc);dt.appendChild(dch);df.appendChild(dt);
    if(c.sd){
      const dlist=document.createElement('div');dlist.className='dlist';
      ['progress','issues','solutions'].forEach(f=>{
        c[f].filter(x=>x.done).forEach(item=>{
          const di=document.createElement('div');di.className='di';
          const dck=document.createElement('div');dck.className='dck';
          dck.onclick=()=>unc(c.id,f,item.t);di.appendChild(dck);
          const dtx=document.createElement('div');dtx.className='dtx';dtx.textContent=item.t;di.appendChild(dtx);
          const dsr=document.createElement('span');dsr.className='dsr';dsr.textContent=FL[f];di.appendChild(dsr);
          dlist.appendChild(di);
        });
      });
      df.appendChild(dlist);
    }
    card.appendChild(df);
  }
  return card;
}

// ── render ─────────────────────────────────────────────────────
function render(){
  const G=document.getElementById('G');G.innerHTML='';
  const isMobile=window.innerWidth<=680;

  if(isMobile){
    const carousel=document.createElement('div');carousel.className='mobile-carousel';
    const track=document.createElement('div');track.className='mobile-track';
    cards.forEach((c,ci)=>track.appendChild(buildCard(c,ci)));
    carousel.appendChild(track);
    let tx0=0,tx1=0;
    carousel.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
    carousel.addEventListener('touchmove',e=>{tx1=e.changedTouches[0].clientX;},{passive:true});
    carousel.addEventListener('touchend',()=>{
      const diff=tx0-tx1;if(Math.abs(diff)<40)return;
      if(diff>0&&mobileIdx<cards.length-1)mobileIdx++;
      else if(diff<0&&mobileIdx>0)mobileIdx--;
      updateCarousel(track,navDots);
    });
    track.style.transform=`translateX(-${mobileIdx*100}%)`;
    G.appendChild(carousel);

    const navDots=document.createElement('div');navDots.className='mobile-nav';
    cards.forEach((_,i)=>{
      const d=document.createElement('div');d.className='mob-dot'+(i===mobileIdx?' active':'');
      d.onclick=()=>{mobileIdx=i;updateCarousel(track,navDots);};
      navDots.appendChild(d);
    });
    G.appendChild(navDots);

    const arrows=document.createElement('div');arrows.className='mobile-arrows';
    const prev=document.createElement('button');prev.className='mob-arrow';prev.textContent='← 上一个';
    prev.onclick=()=>{if(mobileIdx>0){mobileIdx--;updateCarousel(track,navDots);}};
    const counter=document.createElement('span');counter.className='mob-counter';counter.id='mob-counter';counter.textContent=(mobileIdx+1)+' / '+cards.length;
    const next=document.createElement('button');next.className='mob-arrow';next.textContent='下一个 →';
    next.onclick=()=>{if(mobileIdx<cards.length-1){mobileIdx++;updateCarousel(track,navDots);}};
    arrows.appendChild(prev);arrows.appendChild(counter);arrows.appendChild(next);
    G.appendChild(arrows);

    const mob_add=document.createElement('div');mob_add.className='mob-add';
    mob_add.innerHTML='<span style="font-size:18px;">+</span><span>新增项目</span>';
    mob_add.onclick=addCard;G.appendChild(mob_add);
  } else {
    const grid=document.createElement('div');grid.className='grid';
    cards.forEach((c,ci)=>grid.appendChild(buildCard(c,ci)));
    const acard=document.createElement('div');acard.className='ac';
    acard.innerHTML='<span style="font-size:20px;">+</span><span style="font-size:12px;">新增项目</span>';
    acard.onclick=addCard;grid.appendChild(acard);
    G.appendChild(grid);
  }
}

function updateCarousel(track,navDots){
  track.style.transform=`translateX(-${mobileIdx*100}%)`;
  navDots.querySelectorAll('.mob-dot').forEach((d,i)=>d.classList.toggle('active',i===mobileIdx));
  const c=document.getElementById('mob-counter');if(c)c.textContent=(mobileIdx+1)+' / '+cards.length;
}

window.addEventListener('resize',render);

// ── auth gate ────────────────────────────────────────────────
const loginOverlay=document.getElementById('loginOverlay');
const loginBtn=document.getElementById('loginBtn');
const loginEmail=document.getElementById('loginEmail');
const loginPass=document.getElementById('loginPass');
const loginErr=document.getElementById('loginErr');
const logoutBtn=document.getElementById('logoutBtn');

function doLogin(){
  loginErr.textContent='';
  loginBtn.disabled=true;loginBtn.textContent='登录中…';
  signInWithEmailAndPassword(auth,loginEmail.value.trim(),loginPass.value)
    .catch(e=>{
      const m={'auth/invalid-credential':'邮箱或密码错误','auth/invalid-email':'邮箱格式不正确',
        'auth/too-many-requests':'尝试过多，请稍后再试','auth/network-request-failed':'网络连接失败'};
      loginErr.textContent=m[e.code]||('登录失败：'+e.code);
    })
    .finally(()=>{loginBtn.disabled=false;loginBtn.textContent='登录';});
}
loginBtn.addEventListener('click',doLogin);
loginPass.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
logoutBtn.addEventListener('click',()=>signOut(auth));

onAuthStateChanged(auth,(user)=>{
  if(user){
    loginOverlay.classList.add('hide');
    logoutBtn.style.display='';
    setSyncStatus('connecting');
    initData();            // attach DB listener only after we are signed in
  }else{
    loginOverlay.classList.remove('hide');
    logoutBtn.style.display='none';
    loginPass.value='';
  }
});
</script>
