<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的工作台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f5f5f3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px 40px;
}
.logo-mark {
  width: 56px; height: 56px;
  background: #e6f1fb;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 48px;
}
.logo-mark i { font-size: 28px; color: #185fa5; }
.tools-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  width: 100%;
  max-width: 360px;
}
.tool-card {
  background: #fff;
  border: 0.5px solid #e8e8e6;
  border-radius: 12px;
  padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.tool-card:hover {
  border-color: #ccc;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.tool-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tool-icon.teal { background: #e1f5ee; }
.tool-icon.teal i { color: #0f6e56; font-size: 22px; }
.tool-text { flex: 1; }
.tool-name { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
.tool-desc { font-size: 12px; color: #888; }
.tool-arrow i { font-size: 16px; color: #ccc; }
.add-placeholder {
  border: 0.5px dashed #ccc;
  border-radius: 12px;
  padding: 18px 24px;
  display: flex; align-items: center; gap: 12px;
  color: #bbb; font-size: 13px;
}
.add-placeholder i { font-size: 18px; }
footer {
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: #bbb;
}
</style>
</head>
<body>
<div class="hero">
  <div class="logo-mark">
    <i class="ti ti-layout-dashboard"></i>
  </div>
  <div class="tools-grid">
    <a class="tool-card" href="task.html">
      <div class="tool-icon teal"><i class="ti ti-checklist"></i></div>
      <div class="tool-text">
        <div class="tool-name">项目追踪管理</div>
        <div class="tool-desc">一级土地开发项目进展跟踪</div>
      </div>
      <div class="tool-arrow"><i class="ti ti-chevron-right"></i></div>
    </a>
    <div class="add-placeholder">
      <i class="ti ti-plus"></i>
      更多工具即将上线
    </div>
  </div>
</div>
<footer>mingmingyueyue.com</footer>
</body>
</html>
